<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Md Abdul Basit | Portfolio</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Animated Finisher Header Background Layer -->
    <div class="header finisher-header" style="width: 100%; height: 100vh; position: fixed; top: 0; left: 0; z-index: -999; pointer-events: none;"></div>
    <script src="/finisher-header.es5.min.js" type="text/javascript"></script>
    <script type="text/javascript">
      new FinisherHeader({
        "count": 89,
        "size": {
          "min": 1,
          "max": 18,
          "pulse": 0.1
        },
        "speed": {
          "x": {
            "min": 0,
            "max": 0.4
          },
          "y": {
            "min": 0,
            "max": 0.1
          }
        },
        "colors": {
          "background": "#222a46",
          "particles": [
            "#ffffff",
            "#87ddfe",
            "#acaaff",
            "#1bffc2",
            "#f88aff"
          ]
        },
        "blending": "screen",
        "opacity": {
          "center": 0,
          "edge": 0.4
        },
        "skew": -2,
        "shapes": [
          "c",
          "s",
          "t"
        ]
      });
    </script>
  </body>
